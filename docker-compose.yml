services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
    # Webhook mode needs the port published; polling mode (the default)
    # doesn't need this at all since it only makes outbound connections.
    ports:
      - "${WEB_SERVER_PORT:-8080}:8080"

volumes:
  bot_data:
